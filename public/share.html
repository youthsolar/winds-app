<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>🌀 找風問幸福 — 我的占卜結果</title>
  <meta property="og:title" content="找風問幸福 — 我的占卜結果">
  <meta property="og:description" content="易經 × 塔羅 × 量能靈符 — 來看看我的占卜解讀 ✨">
  <meta property="og:image" content="https://app.winds.tw/assets/og-share.png">
  <meta property="og:type" content="website">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=LXGW+WenKai+TC:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/winds.css">
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <style>
    /* ===========================================
       Winds Design System — Share Page
       =========================================== */
    :root {
      --winds-bg: #faf8f6;
      --winds-text: #474747;
      --winds-text-dark: #3b262a;
      --winds-text-sub: #5a656b;
      --winds-text-muted: #999;
      --winds-gold: #c9a84c;
      --winds-gold-dark: #8b6914;
      --winds-accent: #f0e6e6;
      --winds-accent-hover: #e8dadb;
      --winds-card-bg: #ffffff;
      --winds-border: #dcd2d2;
    }

    *, *::before, *::after { box-sizing: border-box; }

    body {
      margin: 0; padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: var(--winds-bg);
      color: var(--winds-text);
      font-size: 14px;
      line-height: 1.6;
    }

    @keyframes windsFadeInUp {
      0%   { opacity: 0; transform: translateY(15px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    .winds-page {
      max-width: 520px;
      margin: 0 auto;
      padding: 20px 16px 40px;
      animation: windsFadeInUp 0.5s ease-out;
    }

    /* --- Header --- */
    .winds-header {
      text-align: center;
      margin-bottom: 28px;
    }
    .winds-header img {
      width: 60px; height: 60px;
      margin-bottom: 6px;
    }
    .winds-header h1 {
      font-family: 'LXGW WenKai TC', cursive;
      font-size: 22px;
      font-weight: 700;
      color: var(--winds-text-dark);
      margin: 0 0 6px 0;
    }
    .winds-header p {
      font-size: 13px;
      color: var(--winds-text-sub);
      margin: 0;
    }
    .winds-header-divider {
      height: 2px;
      background: linear-gradient(to right, transparent, var(--winds-gold), transparent);
      margin: 16px 40px;
    }

    /* --- Cards --- */
    .winds-result-card {
      background: var(--winds-card-bg);
      border-radius: 10px;
      padding: 18px;
      border: 0.5px solid var(--winds-border);
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
      margin-bottom: 16px;
    }
    .winds-section-title {
      font-family: 'LXGW WenKai TC', cursive;
      font-size: 15px;
      font-weight: 700;
      color: var(--winds-gold-dark);
      margin-bottom: 12px;
      text-align: center;
    }

    /* --- Tarot Grid --- */
    .tarot-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 8px;
    }
    .tarot-item { text-align: center; }
    .tarot-item img {
      width: 100%; height: auto;
      object-fit: contain;
      border-radius: 4px;
      border: 1px solid #d4c4a8;
    }
    .tarot-label { font-size: 11px; color: var(--winds-gold-dark); margin-top: 4px; }
    .tarot-name { font-size: 12px; color: var(--winds-text-dark); font-weight: 600; }

    /* --- Astro Table --- */
    .astro-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    .astro-table td {
      padding: 6px 8px;
      border-bottom: 0.5px solid var(--winds-border);
    }
    .astro-table td:first-child {
      width: 70px;
      color: var(--winds-gold-dark);
      white-space: nowrap;
      font-weight: 600;
    }

    /* --- Talisman Preview --- */
    .talisman-preview {
      text-align: center;
      margin: 12px 0;
    }
    .talisman-blur-wrap {
      display: inline-block;
      position: relative;
      width: 100px;
      border-radius: 6px;
      overflow: hidden;
      background: #f5f0eb;
    }
    .talisman-blur-wrap img {
      width: 100%; display: block;
      filter: blur(10px);
      transform: scale(1.1);
    }
    .talisman-blur-wrap .lock-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--winds-gold);
      font-size: 13px;
      font-weight: 600;
      text-shadow: 0 1px 3px rgba(0,0,0,0.3);
    }

    /* --- Summary --- */
    .summary-text {
      font-size: 14px;
      line-height: 1.8;
      color: var(--winds-text-dark);
      text-align: left;
    }

    /* --- Radar Preview --- */
    .radar-preview {
      width: 100px; height: 100px;
      margin: 8px auto;
      border-radius: 50%;
      background: conic-gradient(
        #c9a84c 0% 20%, #4a8f4a 20% 40%, #4a7fb5 40% 60%,
        #c44a4a 60% 80%, #8b6914 80% 100%
      );
      opacity: 0.25;
      filter: blur(3px);
    }

    /* --- Buttons --- */
    .winds-btn {
      display: block;
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      text-decoration: none;
      text-align: center;
    }
    .winds-btn:active { transform: scale(0.98); }
    .winds-btn-primary {
      background: var(--winds-text-dark);
      color: #fff;
    }
    .winds-btn-primary:hover { background: #4a333a; }

    /* --- Message --- */
    .winds-message {
      font-size: 15px;
      color: var(--winds-text-dark);
      line-height: 1.8;
      text-align: center;
      margin: 20px 0;
    }

    /* --- Footer --- */
    .winds-footer {
      text-align: center;
      color: var(--winds-text-muted);
      font-size: 11px;
      margin-top: 24px;
    }

    /* --- Loading --- */
    .winds-loading {
      text-align: center;
      padding: 60px 20px;
    }
    .winds-dots { margin-bottom: 20px; }
    .winds-dots span {
      display: inline-block;
      width: 10px; height: 10px;
      margin: 0 4px;
      background: var(--winds-gold);
      border-radius: 50%;
      animation: windsBounce 1.2s infinite ease-in-out;
    }
    .winds-dots span:nth-child(2) { animation-delay: 0.2s; }
    .winds-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes windsBounce {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
      40%            { transform: scale(1);   opacity: 1; }
    }
    .winds-loading-sub {
      font-size: 13px;
      color: var(--winds-text-sub);
      margin: 0;
    }

    .hint-text {
      font-size: 12px;
      color: var(--winds-text-muted);
      margin-top: 6px;
    }
  </style>
</head>
<body>
  <div class="winds-page">
    <!-- Header -->
    <div class="winds-header">
      <img src="/assets/logo.png" alt="找風問幸福">
      <h1>找風問幸福</h1>
      <p>易經 × 塔羅 × 量能靈符</p>
      <div class="winds-header-divider"></div>
    </div>

    <!-- Loading -->
    <div id="loading" class="winds-loading">
      <div class="winds-dots"><span></span><span></span><span></span></div>
      <p class="winds-loading-sub">載入中…</p>
    </div>

    <!-- Content -->
    <div id="content" style="display:none;"></div>

    <!-- Footer -->
    <div class="winds-footer">&copy; 找風問幸福</div>
  </div>

  <script>
    var WORKER_API = "https://api.winds.tw";
    var LINE_OA_URL = "https://lin.ee/tQHsgWB";

    var params = new URLSearchParams(window.location.search);
    var uid = params.get("uid") || "";

    if (!uid) {
      document.getElementById("loading").innerHTML = '<p class="winds-loading-sub">連結無效</p>';
    } else {
      fetch(WORKER_API + "/share-profile?uid=" + encodeURIComponent(uid))
        .then(function(r) { return r.json(); })
        .then(function(data) {
          document.getElementById("loading").style.display = "none";
          var el = document.getElementById("content");
          el.style.display = "block";

          if (!data.success) {
            el.innerHTML = '<div class="winds-message">這位朋友還沒完成占卜</div>'
              + '<a href="' + LINE_OA_URL + '" class="winds-btn winds-btn-primary">我也來占卜 ✨</a>';
            return;
          }

          var html = '';

          // 本命塔羅牌
          if (data.tarots && data.tarots.length > 0) {
            html += '<div class="winds-result-card"><div class="winds-section-title">🃏 本命塔羅牌組</div><div class="tarot-grid">';
            data.tarots.forEach(function(t) {
              html += '<div class="tarot-item">';
              if (t.image_url) html += '<img src="' + t.image_url + '" alt="' + t.card_name + '">';
              html += '<div class="tarot-label">' + t.label + '</div>';
              html += '<div class="tarot-name">' + t.card_name + '</div></div>';
            });
            html += '</div></div>';
          }

          // 命理一覽
          if (data.xingzuo || data.shengxiao) {
            html += '<div class="winds-result-card"><div class="winds-section-title">✦ 命理一覽</div><table class="astro-table">';
            if (data.xingzuo) html += '<tr><td>⭐ 星座</td><td>' + data.xingzuo + '</td></tr>';
            if (data.shengxiao) html += '<tr><td>🐾 生肖</td><td>' + data.shengxiao + '</td></tr>';
            if (data.twenty_eight_mansion) html += '<tr><td>✨ 星宿</td><td>' + data.twenty_eight_mansion + '</td></tr>';
            html += '</table></div>';
          }

          // 遮罩靈符
          if (data.talisman_preview) {
            html += '<div class="winds-result-card">'
              + '<div class="winds-section-title">🏮 量能靈符</div>'
              + '<div class="talisman-preview"><div class="talisman-blur-wrap">'
              + '<img src="' + data.talisman_preview + '" draggable="false">'
              + '<div class="lock-overlay">🔒 解鎖查看</div>'
              + '</div><div class="hint-text">完成免費占卜即可解鎖你的專屬靈符</div></div></div>';
          }

          // 占卜摘要
          if (data.summary) {
            html += '<div class="winds-result-card"><div class="winds-section-title">🌀 占卜摘要</div>'
              + '<div class="summary-text">' + data.summary + '</div></div>';
          }

          // 五行炁配比預告
          html += '<div class="winds-result-card">'
            + '<div class="winds-section-title">✨ 五行炁配比</div>'
            + '<div style="font-size:12px;color:var(--winds-text-sub);text-align:center;margin-bottom:4px;">木 · 火 · 土 · 金 · 水</div>'
            + '<div class="radar-preview"></div>'
            + '<div class="hint-text" style="text-align:center;">完成占卜查看你的五行量能分佈</div></div>';

          // CTA
          html += '<div class="winds-message">我剛完成了一次深度占卜<br>你也來探索你的命運密碼吧 ✨</div>';
          html += '<a href="' + LINE_OA_URL + '" class="winds-btn winds-btn-primary">免費占卜體驗</a>';

          el.innerHTML = html;
        })
        .catch(function() {
          document.getElementById("loading").innerHTML = '<p class="winds-loading-sub">載入失敗，請稍後再試</p>';
        });
    }
  </script>
</body>
</html>
