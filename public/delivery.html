<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>🏮 完整版解讀 — 找風問幸福</title>
  <meta property="og:title" content="找風問幸福 — 我的占卜結果">
  <meta property="og:description" content="易經 × 塔羅 × 量能靈符 — 來看看我的深度占卜解讀 ✨">
  <meta property="og:image" content="https://app.winds.tw/assets/og-share.png">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://app.winds.tw/delivery.html">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=LXGW+WenKai+TC:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/winds.css">
  <style>
    /* 鎖定手機：防止 iOS 雙擊放大 + input 聚焦放大 */
    html { touch-action: manipulation; -webkit-text-size-adjust: 100%; }
    input, select, textarea { font-size: 16px !important; } /* iOS 不會對 >=16px 的 input 放大 */

    /* ===========================================
       Winds Design System — LIFF V2
       =========================================== */
    :root {
      --winds-bg: #faf8f6;
      --winds-text: #474747;
      --winds-text-dark: #3b262a;
      --winds-text-sub: #5a656b;
      --winds-text-warm: #5a3e3e;
      --winds-text-section: #7a4f4f;
      --winds-text-muted: #999;
      --winds-gold: #c9a84c;
      --winds-gold-dark: #8b6914;
      --winds-accent: #f0e6e6;
      --winds-accent-hover: #e8dadb;
      --winds-card-bg: #ffffff;
      --winds-border: #dcd2d2;
      --winds-border-dark: #5a656b;
      --winds-error: #d9534f;
      --winds-success: #2d6a4f;
      --winds-success-bg: #d4edda;
      --winds-disabled-bg: #e8e8e8;
      --winds-disabled-text: #aaa;
    }

    *, *::before, *::after { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: var(--winds-bg);
      color: var(--winds-text);
      font-size: 14px;
      line-height: 1.6;
    }

    @keyframes windsFadeInUp {
      0%   { opacity: 0; transform: translateY(15px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    .winds-page {
      max-width: 520px;
      margin: 0 auto;
      padding: 20px 16px 40px;
      animation: windsFadeInUp 0.5s ease-out;
    }

    .winds-hidden { display: none !important; }

    /* --- Header --- */
    .winds-header {
      text-align: center;
      margin-bottom: 28px;
    }
    .winds-header h1 {
      font-family: 'LXGW WenKai TC', cursive;
      font-size: 22px;
      font-weight: 700;
      color: var(--winds-text-dark);
      margin: 0 0 6px 0;
    }
    .winds-header p {
      font-size: 13px;
      color: var(--winds-text-sub);
      margin: 0;
    }

    /* --- Status message --- */
    .winds-status {
      display: none;
      padding: 12px 14px;
      border-radius: 10px;
      font-size: 13px;
      line-height: 1.5;
      margin-bottom: 16px;
      animation: windsFadeInUp 0.3s ease-out;
    }
    .winds-status.info  { background: #fdf5f5; border: 1px solid #e8d5d5; color: #6b3a3a; }
    .winds-status.warn  { background: #fff3cd; border: 1px solid #ffc107; color: #664d03; }
    .winds-status.err   { background: #f8d7da; border: 1px solid #f5c2c7; color: #842029; }

    /* ===========================================
       Three-layer Topic Cards
       =========================================== */
    .winds-topic-section {
      margin: 0 0 20px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: flex-start;
      gap: 12px;
    }

    .winds-topic-row,
    .winds-sub-row,
    .winds-third-row,
    #birthCardWrapper {
      box-sizing: border-box;
      flex: 0 0 100% !important;
      max-width: 100% !important;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
      margin: 0;
    }

    .winds-sub-row,
    .winds-third-row { display: none !important; }
    .winds-sub-row.active,
    .winds-third-row.active {
      display: flex !important;
      animation: windsFadeInUp 0.6s ease-out forwards;
    }

    /* Stage 1: first layer selected */
    .winds-topic-section.winds-has-sub-selected:not(.winds-has-third-selected) .winds-topic-row {
      flex: 0 0 100% !important;
      max-width: 100% !important;
      justify-content: center;
    }

    /* Stage 2: first + second layers selected — two columns */
    .winds-topic-section.winds-has-sub-selected.winds-has-third-selected:not(.winds-step-3) .winds-topic-row,
    .winds-topic-section.winds-has-sub-selected.winds-has-third-selected:not(.winds-step-3) .winds-sub-row.active {
      flex: 0 0 calc(50% - 6px) !important;
      max-width: calc(50% - 6px) !important;
    }

    /* Stage 3: all three layers selected — three columns */
    .winds-topic-section.winds-step-3 .winds-topic-row,
    .winds-topic-section.winds-step-3 .winds-sub-row.active,
    .winds-topic-section.winds-step-3 .winds-third-row.active {
      flex: 0 0 calc(33.33% - 8px) !important;
      max-width: calc(33.33% - 8px) !important;
    }

    /* --- Card base styles --- */
    .winds-topic-card,
    .winds-sub-card,
    .winds-third-card {
      box-sizing: border-box;
      flex: 0 0 calc(50% - 6px) !important;
      max-width: calc(50% - 6px) !important;
      background: var(--winds-card-bg);
      border: 0.5px solid var(--winds-border-dark);
      border-radius: 8px;
      padding: 10px;
      font-size: 12px;
      color: var(--winds-text);
      cursor: pointer;
      transition: background-color 0.3s, border-color 0.3s, color 0.3s, box-shadow 0.3s;
    }

    .winds-topic-card-title,
    .winds-sub-card-title,
    .winds-third-card-title {
      font-weight: 600;
      margin-bottom: 4px;
      font-size: 13px;
    }

    .winds-topic-card:hover,
    .winds-sub-card:hover,
    .winds-third-card:hover {
      border-color: var(--winds-border-dark);
      background: var(--winds-accent);
      color: var(--winds-text-dark);
      box-shadow: 0 3px 8px rgba(0,0,0,0.08);
    }

    /* Stage 1: selected first-layer card keeps original width */
    .winds-topic-section.winds-has-sub-selected:not(.winds-has-third-selected) .winds-topic-card.active {
      flex: 0 0 calc(50% - 6px) !important;
      max-width: calc(50% - 6px) !important;
      border-color: var(--winds-border-dark);
      background: var(--winds-accent);
      color: var(--winds-text-dark);
      box-shadow: 0 3px 8px rgba(0,0,0,0.12);
    }

    /* Stage 2 & 3: selected cards fill their row */
    .winds-topic-section.winds-has-sub-selected.winds-has-third-selected .winds-topic-card.active,
    .winds-topic-section.winds-has-sub-selected.winds-has-third-selected .winds-sub-card.active,
    .winds-topic-section.winds-step-3 .winds-topic-card.active,
    .winds-topic-section.winds-step-3 .winds-sub-card.active,
    .winds-topic-section.winds-step-3 .winds-third-card.active {
      flex: 0 0 100% !important;
      max-width: 100% !important;
      border-color: var(--winds-border-dark);
      background: var(--winds-accent);
      color: var(--winds-text-dark);
      box-shadow: 0 3px 8px rgba(0,0,0,0.12);
    }

    /* --- Form card (inside topic section) --- */
    #birthCardWrapper { margin-top: 0; }
    #birthCardWrapper:not(.winds-hidden) {
      animation: windsFadeInUp 0.6s ease-out forwards;
    }

    .winds-bottom-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: flex-start;
      justify-content: center;
    }

    .winds-input-card {
      flex: 0 0 100% !important;
      max-width: 100% !important;
      background: var(--winds-card-bg);
      border-radius: 8px;
      padding: 12px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.04);
      border: 0.5px solid var(--winds-border-dark);
      font-size: 12px;
      color: var(--winds-text);
    }

    .winds-contact-row,
    .winds-birth-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 10px;
    }

    .winds-contact-field {
      flex: 1 1 100px;
      min-width: 100px;
    }
    .winds-contact-field label {
      display: block;
      font-size: 11px;
      margin-bottom: 4px;
      font-weight: 600;
    }

    .winds-required { color: var(--winds-error); margin-left: 2px; }

    .winds-field-tip {
      font-size: 0.82em;
      color: var(--winds-text-muted);
      text-align: left;
      margin: 4px 0 0 0;
      opacity: 0;
      max-height: 0;
      overflow: hidden;
      transition: opacity 0.25s ease, max-height 0.25s ease;
    }
    .winds-field-tip.visible {
      opacity: 1;
      max-height: 2em;
    }

    .winds-input,
    .birth-card-input {
      width: 100%;
      padding: 4px 6px;
      border-radius: 6px;
      border: 1px solid var(--winds-border);
      font-size: 12px !important;
      outline: none;
      color: var(--winds-text);
      box-sizing: border-box;
      height: 30px;
      background: var(--winds-card-bg);
    }
    .winds-input::placeholder,
    .birth-card-input::placeholder { font-size: 12px !important; color: var(--winds-text-muted); }
    .winds-input:focus,
    .birth-card-input:focus {
      border-color: var(--winds-border-dark);
      box-shadow: 0 0 0 1px rgba(90,101,107,0.18);
    }
    .birth-card-input[type="date"],
    .birth-card-input[type="time"] {
      -webkit-appearance: none;
      -moz-appearance: none;
      appearance: none;
    }

    .winds-textarea {
      width: 100%;
      min-height: 110px;
      border-radius: 6px;
      border: 1px solid var(--winds-border);
      padding: 6px 7px;
      font-size: 12px !important;
      resize: vertical;
      outline: none;
      line-height: 1.6;
      color: var(--winds-text);
      font-family: inherit;
      background: var(--winds-card-bg);
    }
    .winds-textarea::placeholder { font-size: 12px !important; color: var(--winds-text-muted); }
    .winds-textarea:focus {
      border-color: var(--winds-border-dark);
      box-shadow: 0 0 0 1px rgba(90,101,107,0.18);
    }

    .winds-char-counter {
      text-align: right;
      font-size: 11px;
      margin-top: 2px;
      color: var(--winds-text-muted);
    }

    .winds-submit-row { text-align: center; margin-top: 10px; }

    /* --- Buttons --- */
    .winds-btn {
      display: block;
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }
    .winds-btn:active { transform: scale(0.98); }
    .winds-btn:disabled { cursor: not-allowed; opacity: 0.6; }

    .winds-btn-primary {
      background: var(--winds-text-dark);
      color: #fff;
    }
    .winds-btn-primary:hover { background: #4a333a; }

    .winds-btn-gold {
      background: var(--winds-gold);
      color: var(--winds-text-dark);
      font-size: 14px;
    }
    .winds-btn-gold:hover { background: #b8963f; }
    .winds-btn-gold:disabled { background: var(--winds-disabled-bg); color: var(--winds-disabled-text); }

    /* ===========================================
       Loading Animation
       =========================================== */
    .winds-loading {
      text-align: center;
      padding: 60px 20px;
      animation: windsFadeInUp 0.5s ease-out;
    }
    .winds-dots {
      margin-bottom: 20px;
    }
    .winds-dots span {
      display: inline-block;
      width: 10px; height: 10px;
      margin: 0 4px;
      background: var(--winds-gold);
      border-radius: 50%;
      animation: windsBounce 1.2s infinite ease-in-out;
    }
    .winds-dots span:nth-child(2) { animation-delay: 0.2s; }
    .winds-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes windsBounce {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
      40%            { transform: scale(1);   opacity: 1; }
    }
    .winds-loading-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--winds-text-dark);
      margin: 0 0 6px;
    }
    .winds-loading-sub {
      font-size: 13px;
      color: var(--winds-text-sub);
      margin: 0;
    }

    /* ===========================================
       Result Card
       =========================================== */
    .winds-result {
      animation: windsFadeInUp 0.5s ease-out;
    }
    .winds-result-card {
      background: var(--winds-card-bg);
      border-radius: 10px;
      padding: 18px;
      border: 0.5px solid var(--winds-border);
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
      margin-bottom: 16px;
    }
    .winds-cooldown-card {
      background: linear-gradient(135deg, #fff8f0, #fff3e6);
      border-radius: 10px;
      padding: 24px 18px;
      border: 0.5px solid #e8c9a0;
      box-shadow: 0 2px 8px rgba(200,150,80,0.1);
      margin-top: 12px;
      margin-bottom: 16px;
      text-align: center;
    }
    .winds-cooldown-card .cooldown-icon {
      font-size: 40px;
      margin-bottom: 12px;
    }
    .winds-cooldown-card .cooldown-message {
      font-size: 14px;
      color: #6b5230;
      line-height: 1.7;
      margin-bottom: 18px;
    }
    .winds-cooldown-card .winds-btn-back {
      display: inline-block;
      padding: 10px 28px;
      border-radius: 8px;
      background: var(--winds-accent);
      color: var(--winds-text-dark);
      font-size: 14px;
      font-weight: 600;
      border: none;
      cursor: pointer;
    }
    .winds-result-label {
      font-family: 'LXGW WenKai TC', cursive;
      font-size: 15px;
      color: var(--winds-gold);
      margin-bottom: 10px;
      font-weight: 600;
    }
    .winds-result-divider {
      height: 1px;
      background: linear-gradient(to right, #c9a84c, transparent);
      margin-bottom: 14px;
    }
    .winds-result-text {
      white-space: pre-wrap;
      line-height: 1.7;
      font-size: 14px;
      color: var(--winds-text-dark);
      padding: 14px;
      background: var(--winds-bg);
      border-radius: 8px;
      border: 1px solid var(--winds-accent);
      margin-bottom: 16px;
    }

    /* --- Footer --- */
    .winds-footer {
      text-align: center;
      color: var(--winds-text-muted);
      font-size: 11px;
      margin-top: 24px;
    }

    /* ===========================================
       RWD — Mobile
       =========================================== */
    @media (max-width: 768px) {
      .winds-topic-section { display: block; gap: 0; }

      .winds-topic-row,
      .winds-sub-row,
      .winds-third-row,
      #birthCardWrapper,
      .winds-topic-section.winds-has-sub-selected:not(.winds-has-third-selected) .winds-topic-row,
      .winds-topic-section.winds-has-sub-selected.winds-has-third-selected:not(.winds-step-3) .winds-topic-row,
      .winds-topic-section.winds-has-sub-selected.winds-has-third-selected:not(.winds-step-3) .winds-sub-row.active,
      .winds-topic-section.winds-step-3 .winds-topic-row,
      .winds-topic-section.winds-step-3 .winds-sub-row.active,
      .winds-topic-section.winds-step-3 .winds-third-row.active {
        flex: none !important;
        max-width: 100% !important;
        width: 100% !important;
        margin-top: 12px !important;
      }

      .winds-topic-card,
      .winds-sub-card,
      .winds-third-card {
        flex: 0 0 100% !important;
        max-width: 100% !important;
      }

      .winds-topic-section.winds-has-sub-selected:not(.winds-has-third-selected) .winds-topic-card.active,
      .winds-topic-section.winds-has-sub-selected.winds-has-third-selected .winds-topic-card.active,
      .winds-topic-section.winds-has-sub-selected.winds-has-third-selected .winds-sub-card.active,
      .winds-topic-section.winds-step-3 .winds-topic-card.active,
      .winds-topic-section.winds-step-3 .winds-sub-card.active,
      .winds-topic-section.winds-step-3 .winds-third-card.active {
        flex: 0 0 100% !important;
        max-width: 100% !important;
      }

      .winds-bottom-row { flex-direction: column; }

      .winds-input-card {
        flex: none !important;
        max-width: 100% !important;
        width: 100% !important;
      }

      .winds-contact-field {
        flex: 1 1 calc(50% - 5px) !important;
        max-width: calc(50% - 5px) !important;
        min-width: calc(50% - 5px) !important;
      }

      .winds-birth-row {
        flex-wrap: nowrap !important;
      }
    }
  
    /* === delivery.html 專用 === */
    .winds-paid-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      color: var(--winds-gold);
      text-transform: uppercase;
      text-align: center;
      margin-bottom: 4px;
    }
    .winds-content-text {
      white-space: pre-wrap;
      line-height: 1.7;
      font-size: 15px;
      color: var(--winds-text-dark);
      border: 1px solid var(--winds-accent);
      border-radius: 6px;
      padding: 14px;
      background: var(--winds-bg);
    }
    .winds-section-title {
      font-family: 'LXGW WenKai TC', cursive;
      font-size: 14px;
      font-weight: 700;
      color: var(--winds-gold);
      letter-spacing: 0.05em;
      margin: 16px 0 6px 0;
      padding-bottom: 4px;
      border-bottom: 1px solid rgba(201,168,76,0.3);
    }
    .winds-section-subtitle {
      font-size: 13px;
      font-weight: 600;
      color: var(--winds-text-section);
      margin: 12px 0 4px 0;
    }
    .winds-talisman-wrap {
      text-align: center;
      margin-bottom: 16px;
    }
    .winds-talisman-img {
      width: 120px;
      max-width: 120px;
      border-radius: 8px;
      box-shadow: 0 4px 16px rgba(91,45,130,0.2);
      display: block;
      margin: 0 auto;
    }
    .winds-card-grid {
      display: grid;
      grid-template-columns: repeat(5,1fr);
      gap: 6px;
      margin-bottom: 16px;
    }
    .winds-card-grid img {
      width: 100%;
      border-radius: 6px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
    }
    .winds-meta {
      font-size: 12px;
      color: var(--winds-text-muted);
      text-align: center;
      margin-top: 12px;
    }
    /* 命理資料卡（與免費版統一） */
    .winds-astro-card {
      background: var(--winds-card-bg);
      border: 0.5px solid var(--winds-border);
      border-radius: 10px;
      padding: 18px;
      margin-bottom: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
      color: var(--winds-text-dark);
    }
    .astro-card-title {
      font-family: 'LXGW WenKai TC', cursive;
      font-size: 15px;
      font-weight: 700;
      color: var(--winds-gold-dark);
      margin-bottom: 10px;
      text-align: center;
    }
    .astro-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }
    .astro-table td {
      padding: 8px;
      border-bottom: 0.5px solid var(--winds-border);
    }
    .astro-table td:first-child {
      width: 90px;
      color: var(--winds-gold-dark);
      white-space: nowrap;
      font-weight: 600;
    }
    .astro-tarot-section {
      margin-top: 12px;
      padding-top: 10px;
      border-top: 0.5px solid var(--winds-border);
    }
    .astro-tarot-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--winds-gold-dark);
      margin-bottom: 8px;
    }
    .astro-tarot-grid {
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .astro-tarot-item {
      text-align: center;
      width: 70px;
    }
    .astro-tarot-item img {
      width: 60px;
      height: 90px;
      object-fit: contain;
      border-radius: 4px;
      border: 1px solid #d4c4a8;
    }
    .astro-tarot-label {
      font-size: 12px;
      color: var(--winds-gold-dark);
      margin-top: 4px;
    }
    .astro-tarot-name {
      font-size: 13px;
      color: var(--winds-text-dark);
      font-weight: 600;
    }
    .astro-profile-section {
      margin-top: 12px;
      padding-top: 10px;
      border-top: 0.5px solid var(--winds-border);
    }
    .astro-profile-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--winds-gold-dark);
      margin-bottom: 6px;
    }
    .astro-profile-text {
      font-size: 14px;
      line-height: 1.7;
      color: var(--winds-text-warm);
    }
    .astro-profile-toggle {
      background: none;
      border: none;
      color: var(--winds-gold-dark);
      font-size: 13px;
      cursor: pointer;
      padding: 4px 0;

    .kongming-poem::before { content: '「'; color: var(--winds-gold); font-size: 16px; line-height: 1; }

  <!-- Google GIS loaded from index.html session -->
  <script>
  (function() {
    "use strict";
    var googleIdToken = "";

    // Google SSO mode (no LIFF)
    var WORKER_API = "https://api.winds.tw";
    var DELIVERY_API = "https://api.winds.tw/delivery-content";

    function getGoogleIdToken() {
      return googleIdToken || '';
    }
    function $(id) { return document.getElementById(id); }

    function escapeHtml(s) {
      if (s == null) return '';
      return String(s).replace(/[&<>"']/g, function(c) {
        return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
      });
    }

    function parseKongmingText(text) {
      if (!text) return null;
      var k = {};
      var lines = text.split('\n');
      for (var i = 0; i < lines.length; i++) {
        var line = lines[i];
        if (line.indexOf('籤序：') === 0) k.signOrder = line.substring(3);
        else if (line.indexOf('本卦：') === 0) {
          var m = line.substring(3).match(/^(.+?)（(.+?)·(.+?)）$/);
          if (m) { k.curHex = m[1]; k.palace = m[2]; k.curEl = m[3]; }
          else k.curHex = line.substring(3);
        }
        else if (line.indexOf('變爻：') === 0) k.trigger = line.substring(3);
        else if (line.indexOf('變卦：') === 0) {
          var m2 = line.substring(3).match(/^(.+?)（(.+?)）$/);
          if (m2) { k.chgHex = m2[1]; k.chgEl = m2[2]; }
          else k.chgHex = line.substring(3);
        }
        else if (line.indexOf('籤等：') === 0) k.fortuneLevel = line.substring(3);
        else if (line.indexOf('吉凶：') === 0) k.fortuneCategory = line.substring(3);
        else if (line.indexOf('五象') === 0 && line.indexOf('：') > 0) k.symbols = line.substring(line.indexOf('：') + 1).split('、').filter(Boolean);
        else if (line.indexOf('籤詩：') === 0) k.poem = line.substring(3);
        else if (line.indexOf('解讀：') === 0) k.interp = line.substring(3);
      }
      return k;
    }

    function renderKongmingSection(el, signText, isPaid) {
      var k = parseKongmingText(signText);
      if (!k || !k.curHex) { el.style.display = 'none'; return; }
      var tier = 'tier-mid';
      if (k.fortuneLevel && (k.fortuneLevel.indexOf('上上') >= 0 || k.fortuneLevel === '上籤')) tier = 'tier-top';
      else if (k.fortuneLevel && (k.fortuneLevel.indexOf('下') >= 0 || k.fortuneLevel.indexOf('凶') >= 0)) tier = 'tier-low';

      var symbolsHtml = '';
      var isShunMing = k.symbols && k.symbols.length > 0 && k.symbols.every(function(s) { return s === '命'; });
      if (isShunMing) {
        symbolsHtml = '<span class="kongming-shunming">順命而行</span>';
      } else if (k.symbols && k.symbols.length > 0) {
        symbolsHtml = '<span class="kongming-symbols">' + k.symbols.map(function(s) {
          return '<span class="kongming-sym-dot" data-el="' + escapeHtml(s) + '">' + escapeHtml(s) + '</span>';
        }).join('') + '</span>';
      }

      var interpHtml = '';
      if (k.interp) {
        if (isPaid) {
          interpHtml = '<div class="kongming-interp-label">📜 預言</div><div class="kongming-interp-text">' + escapeHtml(k.interp) + '</div>';
        } else {
          var snippet = k.interp.length > 80 ? k.interp.substring(0, 80) + '…' : k.interp;
          interpHtml = '<div class="kongming-interp-label">📜 預言</div><div class="kongming-interp-text">' + escapeHtml(snippet) + '</div><div class="kongming-interp-locked">解鎖完整預言 →</div>';
        }
      }

      el.innerHTML =
        '<div class="kongming-header-row">'
          + '<div class="kongming-title">⚡ 孔明大易神數 · 難以脫逃的人心</div>'
          + (k.fortuneLevel ? '<span class="kongming-badge ' + tier + '">' + escapeHtml(k.fortuneLevel) + '</span>' : '')
        + '</div>'
        + '<div class="kongming-flow">'
          + '<div class="kongming-hex">'
            + '<div class="kongming-hex-name">' + escapeHtml(k.curHex || '') + '</div>'
            + '<div class="kongming-hex-meta">' + escapeHtml((k.palace || '') + (k.curEl ? '·' + k.curEl : '')) + '</div>'
          + '</div>'
          + '<div class="kongming-arrow">'
            + '<div class="kongming-arrow-line">→</div>'
            + '<div>' + escapeHtml(k.trigger || '動爻') + '</div>'
          + '</div>'
          + '<div class="kongming-hex">'
            + '<div class="kongming-hex-name">' + escapeHtml(k.chgHex || '') + '</div>'
            + '<div class="kongming-hex-meta">' + escapeHtml(k.chgEl || '') + '</div>'
          + '</div>'
        + '</div>'
        + (k.fortuneCategory || symbolsHtml ?
          '<div class="kongming-meta-row">'
            + (k.fortuneCategory ? '<span class="kongming-fortune">▎' + escapeHtml(k.fortuneCategory) + '</span>' : '')
            + symbolsHtml
          + '</div>' : '')
        + (k.poem ? '<div class="kongming-poem">' + escapeHtml(k.poem) + '</div>' : '')
        + interpHtml;
      el.style.display = 'block';
    }

    function renderProfileText(text) {
      return text
        .replace(/^## (.+)$/gm, '__SECTION_TITLE__$1__END__')
        .replace(/^### (.+)$/gm, '__SECTION_SUBTITLE__$1__END__')
        .replace(/#{1,6}\s*/g, '')
        .replace(/\*\*(.*?)\*\*/g, '$1')
        .replace(/\*(.*?)\*/g, '$1')
        .replace(/`{1,3}([^`]*)`{1,3}/g, '$1')
        .replace(/---+/g, '─────')
        .replace(/\n{3,}/g, '\n\n')
        .trim()
        .replace(/__SECTION_TITLE__(.+?)__END__/g, '<div class="winds-section-title">$1</div>')
        .replace(/__SECTION_SUBTITLE__(.+?)__END__/g, '<div class="winds-section-subtitle">$1</div>')
        .replace(/\n/g, '<br>');
    }

    function showLoading() {
      $("loadingSection").style.display = "block";
      $("contentSection").style.display = "none";
      $("errorSection").style.display = "none";
    }

    function showContent(text, meta, talismanUrl, cardImages, extraData) {
      $("loadingSection").style.display = "none";
      $("contentSection").style.display = "block";
      $("errorSection").style.display = "none";

      // 命理資料卡
      var astroCardEl = $("astroCard");
      var extra = extraData || {};
      var astro = extra.astro;
      var benMingTarots = extra.ben_ming_tarots || [];
      var profile = extra.personality_profile || '';

      if (astroCardEl && astro && (astro.xingzuo || astro.shengxiao || astro.full_bazi)) {
        var rows = '';
        if (astro.lunar_birthday) rows += '<tr><td>🌙 農曆</td><td>' + astro.lunar_birthday + '</td></tr>';
        if (astro.xingzuo) rows += '<tr><td>⭐ 星座</td><td>' + astro.xingzuo + '</td></tr>';
        if (astro.shengxiao) rows += '<tr><td>🐾 生肖</td><td>' + astro.shengxiao + '</td></tr>';
        if (astro.twenty_eight_mansion) rows += '<tr><td>🌟 星宿</td><td>' + astro.twenty_eight_mansion + '</td></tr>';
        if (astro.full_bazi) rows += '<tr><td>📜 八字</td><td>' + astro.full_bazi + '</td></tr>';
        if (astro.naiyin_year || astro.naiyin_month || astro.naiyin_day || astro.naiyin_hour) {
          var np = [];
          if (astro.naiyin_year) np.push('年：' + astro.naiyin_year);
          if (astro.naiyin_month) np.push('月：' + astro.naiyin_month);
          if (astro.naiyin_day) np.push('日：' + astro.naiyin_day);
          if (astro.naiyin_hour) np.push('時：' + astro.naiyin_hour);
          rows += '<tr><td>🔔 納音</td><td>' + np.join('｜') + '</td></tr>';
        }
        if (astro.taisui_conflict_status) rows += '<tr><td>⚡ 太歲</td><td>' + astro.taisui_conflict_status + '</td></tr>';
        if (astro.taisui_deity_birth) rows += '<tr><td>🛡️ 本命星君</td><td>' + astro.taisui_deity_birth + '</td></tr>';
        if (astro.taisui_deity_year) rows += '<tr><td>🏯 流年星君</td><td>' + astro.taisui_deity_year + '</td></tr>';

        var cardHtml = '<div class="astro-card-title">📋 你的命理資料</div>'
          + '<table class="astro-table"><tbody>' + rows + '</tbody></table>';

        // 本命塔羅
        if (benMingTarots.length > 0) {
          cardHtml += '<div class="astro-tarot-section"><div class="astro-tarot-title">🎴 本命塔羅牌組</div><div class="astro-tarot-grid">';
          benMingTarots.forEach(function(t) {
            cardHtml += '<div class="astro-tarot-item">'
              + '<img src="' + t.image_url + '" alt="' + t.card_name + '">'
              + '<div class="astro-tarot-label">' + t.label + '</div>'
              + '<div class="astro-tarot-name">' + t.card_name + '</div></div>';
          });
          cardHtml += '</div></div>';
        }

        // 五行量能雷達圖
        var wuxingRadar = astro.wuxing_radar;
        if (wuxingRadar) {
          cardHtml += '<div class="winds-wuxing-chart">'
            + '<div class="astro-profile-title">✨ 五行炁配比</div>'
            + '<canvas id="wuxingRadarChart" width="260" height="260" style="display:block;margin:0 auto;max-width:100%"></canvas>'
            + '</div>';
        }

        // 分靈體側寫
        if (profile) {
          var shortProfile = profile.length > 150 ? profile.substring(0, 150) + '…' : profile;
          cardHtml += '<div class="astro-profile-section">'
            + '<div class="astro-profile-title">✨ 你的分靈體側寫</div>'
            + '<div id="profileShort" class="astro-profile-text">' + renderProfileText(shortProfile) + '</div>'
            + '<div id="profileFull" class="astro-profile-text" style="display:none">' + renderProfileText(profile) + '</div>'
            + (profile.length > 150 ? '<button id="profileToggleBtn" class="astro-profile-toggle">更多</button>' : '')
            + '</div>';
        }

        astroCardEl.innerHTML = cardHtml;
        astroCardEl.style.display = 'block';

        // 初始化五行雷達圖
        if (wuxingRadar && typeof Chart !== 'undefined') {
          setTimeout(function() {
            var ctx = document.getElementById('wuxingRadarChart');
            if (!ctx) return;
            var labels = ['🌿 木 ' + wuxingRadar['木'], '🔥 火 ' + wuxingRadar['火'], '🌍 土 ' + wuxingRadar['土'], '⚙️ 金 ' + wuxingRadar['金'], '💧 水 ' + wuxingRadar['水']];
            new Chart(ctx, {
              type: 'radar',
              data: {
                labels: labels,
                datasets: [{
                  data: [wuxingRadar['木'], wuxingRadar['火'], wuxingRadar['土'], wuxingRadar['金'], wuxingRadar['水']],
                  backgroundColor: 'rgba(201,168,76,0.25)',
                  borderColor: '#c9a84c',
                  borderWidth: 2,
                  pointBackgroundColor: '#c9a84c',
                  pointRadius: 4,
                }]
              },
              options: {
                responsive: false,
                scales: {
                  r: {
                    suggestedMin: 0,
                    ticks: { display: false },
                    grid: { color: 'rgba(59,38,42,0.1)' },
                    pointLabels: { font: { size: 13 }, color: '#3b262a' },
                    angleLines: { color: 'rgba(59,38,42,0.1)' },
                  }
                },
                plugins: { legend: { display: false } }
              }
            });
          }, 100);
        }

        // 綁定折疊
        var toggleBtn = document.getElementById("profileToggleBtn");
        if (toggleBtn) {
          toggleBtn.addEventListener("click", function() {
            var s = document.getElementById("profileShort");
            var f = document.getElementById("profileFull");
            if (f && s) {
              if (f.style.display === "none") {
                f.style.display = "block"; s.style.display = "none";
                toggleBtn.textContent = "收起";
              } else {
                f.style.display = "none"; s.style.display = "block";
                toggleBtn.textContent = "更多";
              }
            }
          });
        }
      }

      // 符令圖（付費版，無遮罩，可下載）
      if (talismanUrl) {
        $("talismanImg").src = talismanUrl;
        var dlBtn = $("talismanDownloadBtn");
        if (dlBtn) dlBtn.href = talismanUrl;
        // 卦名：天山 遁卦
        var nameLabel = $("hexagramNameLabel");
        if (nameLabel) {
          var upperGua = extra.upper_gua || '';
          var lowerGua = extra.lower_gua || '';
          var hexName = extra.hexagram_name || '';
          nameLabel.textContent = (upperGua + lowerGua ? upperGua + lowerGua + '　' : '') + (hexName ? hexName + '卦' : '');
        }
        $("talismanWrap").style.display = "block";
      } else {
        $("talismanWrap").style.display = "none";
      }

      // 塔羅牌陣（5 欄 grid + 牌位名 + 正逆位）
      var grid = $("cardGrid");
      grid.innerHTML = "";
      var tarotCards = extra.tarot_cards || [];
      if (tarotCards.length > 0) {
        tarotCards.forEach(function(c) {
          var polarity = c.is_reversed ? "逆位" : "正位";
          var polarityColor = c.is_reversed ? "#c0392b" : "#27ae60";
          var div = document.createElement("div");
          div.style.cssText = "text-align:center;display:flex;flex-direction:column;";
          div.innerHTML = '<div style="font-size:12px;color:var(--winds-gold-dark);font-weight:600;margin-bottom:4px;">' + c.position + '</div>'
            + '<div style="flex:1;display:flex;align-items:center;justify-content:center;min-height:0;">'
            + '<img src="' + c.image_url + '" style="width:100%;height:auto;max-height:140px;object-fit:contain;border-radius:6px;box-shadow:0 2px 6px rgba(0,0,0,0.15);">'
            + '</div>'
            + '<div style="margin-top:6px;font-size:12px;">'
            + '<div style="font-weight:600;color:var(--winds-text-dark);">' + c.card_name + '</div>'
            + '<div style="color:' + polarityColor + ';font-size:11px;">' + polarity + '</div>'
            + '</div>';
          grid.appendChild(div);
        });
        $("cardGridWrap").style.display = "block";
      } else if (cardImages && cardImages.length > 0) {
        // fallback：舊格式只有圖片 URL
        cardImages.forEach(function(url, i) {
          if (url) {
            var img = document.createElement("img");
            img.src = url;
            img.alt = "第" + (i + 1) + "張牌";
            grid.appendChild(img);
          }
        });
        $("cardGridWrap").style.display = "block";
      } else {
        $("cardGridWrap").style.display = "none";
      }

      // 輔卦完整版（付費專屬）
      var oracleSection = $("oracleSection");
      if (oracleSection && extra.oracle_type && extra.oracle_sign_text) {
        var oLines = extra.oracle_sign_text.split('\n');
        var oSignOrder = oLines[0] || '';
        var oPoemLine = (oLines.find(function(l) { return l.startsWith('詩：'); }) || '').replace('詩：', '');
        var oHolyLine = (oLines.find(function(l) { return l.startsWith('聖意：'); }) || '').replace('聖意：', '');
        var oGuidanceLine = (oLines.find(function(l) { return l.startsWith('解：'); }) || '').replace('解：', '');
        var oFortuneLvl = '';
        var oMatch = oSignOrder.match(/（(.+?)）/);
        if (oMatch) oFortuneLvl = oMatch[1];

        oracleSection.innerHTML =
          '<div class="winds-oracle-header">🔮 ' + extra.oracle_type + '</div>'
          + '<div class="winds-oracle-sub">' + oSignOrder.replace(/（.+?）/, '').replace(extra.oracle_type + ' ', '') + '</div>'
          + '<div class="winds-oracle-poem">' + oPoemLine + '</div>'
          + (oFortuneLvl ? '<div class="winds-oracle-fortune">' + oFortuneLvl + '</div>' : '')
          + '<div class="winds-oracle-detail">'
          + (oHolyLine ? '<div class="winds-oracle-detail-label">✨ 聖意</div><div class="winds-oracle-detail-text">' + oHolyLine + '</div>' : '')
          + (oGuidanceLine ? '<div class="winds-oracle-detail-label">📜 解籤</div><div class="winds-oracle-detail-text">' + oGuidanceLine + '</div>' : '')
          + '</div>';
        oracleSection.style.display = 'block';
      } else if (oracleSection) {
        oracleSection.style.display = 'none';
      }

      // 孔明大易神數 — 最後一擊（付費版完整解讀）
      var kmSection = $("kongmingSection");
      if (kmSection && extra.secondary_oracle_sign_text) {
        renderKongmingSection(kmSection, extra.secondary_oracle_sign_text, true);
      } else if (kmSection) {
        kmSection.style.display = 'none';
      }

      // 節氣運勢曲線標題（含卦象+生剋）
      var dlFortuneTitle = $("fortuneLineTitle");
      if (dlFortuneTitle && extra.hexagram_name) {
        var dlShengKe = extra.sheng_ke || '';
        dlFortuneTitle.innerHTML = '📈 近期日主節氣運勢 遇 ' + extra.hexagram_name + '卦象'
          + (dlShengKe ? ' <span style="color:#d9534f;font-weight:700;">' + dlShengKe + '</span>' : '');
      }
      // 節氣運勢曲線（付費版完整顯示）
      var dlFortuneWrap = $("fortuneLineWrap");
      var dlFortuneLine = extra.fortune_line;
      if (dlFortuneWrap && dlFortuneLine && dlFortuneLine.length > 0 && typeof Chart !== 'undefined') {
        dlFortuneWrap.style.display = 'block';
        var dlCtx = document.getElementById('fortuneLineChart');
        if (dlCtx) {
          var dlLabels = dlFortuneLine.map(function(p) { return p.month + '月\n' + p.name; });
          var dlScores = dlFortuneLine.map(function(p) { return p.score; });
          var dlMax = Math.max.apply(null, dlScores);
          var dlMin = Math.min.apply(null, dlScores);
          var dlPtColors = dlScores.map(function(s) { return s === dlMax ? '#c0392b' : s === dlMin ? '#333333' : '#c9a84c'; });
          var dlPtRadii = dlScores.map(function(s) { return (s === dlMax || s === dlMin) ? 7 : 4; });
          new Chart(dlCtx, {
            type: 'line',
            data: {
              labels: dlLabels,
              datasets: [{
                data: dlScores,
                borderColor: '#c9a84c',
                borderWidth: 2,
                pointBackgroundColor: dlPtColors,
                pointRadius: dlPtRadii,
                tension: 0.4,
                fill: false,
              }]
            },
            options: {
              responsive: true,
              plugins: { legend: { display: false }, tooltip: {
                callbacks: { label: function(ctx) { return dlFortuneLine[ctx.dataIndex].label + '（' + (ctx.raw > 0 ? '+' : '') + ctx.raw + '）'; } }
              }},
              scales: {
                y: { min: -100, max: 100, grid: { color: 'rgba(59,38,42,0.1)' },
                  ticks: { callback: function(v) { return v === 85 ? '吉' : v === 50 ? '小吉' : v === 0 ? '平' : v === -50 ? '小慎' : v === -70 ? '慎' : ''; }, stepSize: 50, font: { size: 13 }, color: '#3b262a' }
                },
                x: { grid: { display: false }, ticks: { font: { size: 10 }, color: '#8b6914' } }
              }
            }
          });
        }
      } else if (dlFortuneWrap) {
        dlFortuneWrap.style.display = 'none';
      }

      // Strip markdown 雜訊（保留 ## / ### 標題）
      var cleanText = text
        .replace(/^## (.+)$/gm, '__SECTION_TITLE__$1__END__')
        .replace(/^### (.+)$/gm, '__SECTION_SUBTITLE__$1__END__')
        .replace(/#{1,6}\s*/g, '')
        .replace(/\*\*(.*?)\*\*/g, '$1')
        .replace(/\*(.*?)\*/g, '$1')
        .replace(/---+/g, '─────')
        .replace(/\n{3,}/g, '\n\n')
        .trim()
        .replace(/__SECTION_TITLE__(.+?)__END__/g, '<div class="winds-section-title">$1</div>')
        .replace(/__SECTION_SUBTITLE__(.+?)__END__/g, '<div class="winds-section-subtitle">$1</div>');
      $("contentText").innerHTML = cleanText;
      if (meta) $("metaInfo").textContent = meta;
      window._deliveryContent = text;
    }

    // 計算距離解鎖還有幾天（paid_at + (step-1)*7天）
    function daysUntilUnlock(paidAt, step) {
      var base = new Date(paidAt);
      var unlockDate = new Date(base.getTime() + (step - 1) * 7 * 24 * 60 * 60 * 1000);
      var now = new Date();
      var diff = Math.ceil((unlockDate - now) / (1000 * 60 * 60 * 24));
      return diff > 0 ? diff : 0;
    }

    function renderCardWallpapers(cardUrls, unlockStep, deliveryToken, paidAt, talismanElements) {
      var wrap = $("cardWallpaperWrap");
      var grid = $("cardWallpaperGrid");
      if (!wrap || !grid) return;
      wrap.style.display = "block";
      grid.innerHTML = "";
      // 從 /config 動態讀取價格後再渲染卡片
      var UNLOCK_PRICE = Number(window._configUnlockPrice) || 100;
      doRenderCards(cardUrls, unlockStep, deliveryToken, paidAt, UNLOCK_PRICE, grid, talismanElements || []);
    }

    function doRenderCards(cardUrls, unlockStep, deliveryToken, paidAt, UNLOCK_PRICE, grid, talismanElements) {
      cardUrls.forEach(function(url, i) {
        var step = i + 1;
        var isUnlocked = step <= (unlockStep || 1);
        var days = isUnlocked ? 0 : daysUntilUnlock(paidAt, step);
        var canUnlock = !isUnlocked && days === 0;

        var card = document.createElement("div");
        card.style.cssText = "display:flex;flex-direction:column;align-items:center;gap:4px;";

        // 步數標籤（圖片上方）
        var stepLabel = document.createElement("div");
        stepLabel.style.cssText = "font-size:11px;font-weight:600;color:#8b6914;margin-bottom:2px;";
        var elemLabel = (talismanElements && talismanElements[i]) ? " " + talismanElements[i] : "";
        stepLabel.textContent = step + elemLabel;
        card.appendChild(stepLabel);

        // 圖片區
        var imgWrap = document.createElement("div");
        imgWrap.style.cssText = "position:relative;width:100%;aspect-ratio:9/16;border-radius:6px;overflow:hidden;-webkit-backface-visibility:hidden;backface-visibility:hidden;background:#0d0d0d;isolation:isolate;";

        var img = document.createElement("img");
        img.src = WORKER_API + "/card-image/" + deliveryToken + "/" + step;
        img.alt = "靈符 " + step;
        if (!isUnlocked) {
          // 未解鎖：圖片放大 + blur，用 inset 容器裁切避免邊緣線
          img.style.cssText = "width:140%;height:140%;position:absolute;top:-20%;left:-20%;object-fit:cover;filter:blur(16px);-webkit-user-select:none;user-select:none;pointer-events:none;";
        } else {
          img.style.cssText = "width:100%;height:100%;object-fit:cover;";
        }
        imgWrap.appendChild(img);
        card.appendChild(imgWrap);

        // 下方資訊區
        var info = document.createElement("div");
        info.style.cssText = "text-align:center;width:100%;min-height:38px;display:flex;flex-direction:column;justify-content:flex-start;align-items:center;";


        if (isUnlocked) {
          // 已解鎖
          var statusEl = document.createElement("div");
          statusEl.style.cssText = "font-size:9px;color:#7ed989;margin-bottom:3px;";
          statusEl.textContent = "已解鎖";
          info.appendChild(statusEl);

          // 下載連結
          var dlLink = document.createElement("a");
          dlLink.href = WORKER_API + "/card-image/" + deliveryToken + "/" + step;
          dlLink.download = "talisman-" + step + ".jpg";
          dlLink.style.cssText = "display:block;padding:4px 0;width:100%;background:var(--winds-accent);color:var(--winds-text-dark);border:none;border-radius:6px;font-size:10px;font-weight:600;text-decoration:none;text-align:center;line-height:1.4;box-sizing:border-box;";
          dlLink.textContent = "💾 儲存";
          info.appendChild(dlLink);
        } else if (canUnlock) {
          // 可解鎖（冷卻結束）
          var statusEl2 = document.createElement("div");
          statusEl2.style.cssText = "font-size:9px;color:var(--winds-gold);margin-bottom:3px;";
          statusEl2.textContent = "可解鎖";
          info.appendChild(statusEl2);

          var unlockBtn = document.createElement("button");
          unlockBtn.style.cssText = "padding:4px 0;width:100%;background:var(--winds-accent);color:var(--winds-text-dark);border:none;border-radius:6px;font-size:10px;font-weight:600;cursor:pointer;line-height:1.4;box-sizing:border-box;";
          unlockBtn.textContent = "🔓 NT$" + UNLOCK_PRICE;
          unlockBtn.onclick = function() { triggerUnlockPayment(deliveryToken, step, UNLOCK_PRICE); };
          info.appendChild(unlockBtn);
        } else {
          // 冷卻中
          var statusEl3 = document.createElement("div");
          statusEl3.style.cssText = "font-size:9px;color:#9b8aa0;";
          statusEl3.textContent = "⏳ " + days + "天";
          info.appendChild(statusEl3);
        }

        card.appendChild(info);
        grid.appendChild(card);
      });
    }

    function triggerUnlockPayment(deliveryToken, step, price) {
      // 先檢查冷卻狀態，OK 就直接導向 Worker（Worker 回傳 ECPay form 自動 submit）
      fetch(WORKER_API + "/liff-unlock-order", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ delivery_token: deliveryToken, step: step, amount: price })
      })
      .then(function(r) { return r.json(); })
      .then(function(d) {
        if (d.ok === false) {
          alert(d.error || "目前無法解鎖");
        } else if (d.pay_url) {
          window.location.href = d.pay_url;
        }
      })
      .catch(function() { alert("網路錯誤，請稍後再試"); });
    }

    function startCardPolling(token, attempt) {
      if (attempt >= 12) {
        var txt = $("cardLoadingText");
        if (txt) txt.textContent = "靈符仍在凝聚中，請稍後重新整理頁面 🙏";
        return;
      }
      setTimeout(function() {
        fetch(DELIVERY_API + "?token=" + encodeURIComponent(token), { method: "GET", headers: { 'X-Google-Id-Token': getGoogleIdToken() } })
          .then(function(r) { return r.json(); })
          .then(function(d) {
            if (d.success && d.card_urls && d.card_urls.length > 0) {
              renderCardWallpapers(d.card_urls, d.unlock_step || 1, token, d.paid_at || '', d.talisman_elements || []);
            } else {
              startCardPolling(token, attempt + 1);
            }
          })
          .catch(function() { startCardPolling(token, attempt + 1); });
      }, 8000);
    }

    function showError(title, desc) {
      $("loadingSection").style.display = "none";
      $("contentSection").style.display = "none";
      $("errorSection").style.display = "block";
      $("errorTitle").textContent = title;
      $("errorDesc").textContent = desc;
    }

    var LINE_OA_URL = "https://lin.ee/tQHsgWB";

    // 八卦 Unicode 對照
    var guaUnicode = {
      '乾': '☰', '天': '☰', '兌': '☱', '澤': '☱',
      '離': '☲', '火': '☲', '震': '☳', '雷': '☳',
      '巽': '☴', '風': '☴', '坎': '☵', '水': '☵',
      '艮': '☶', '山': '☶', '坤': '☷', '地': '☷'
    };

    function showSummaryMode(data) {
      $("loadingSection").style.display = "none";
      $("contentSection").style.display = "block";
      $("errorSection").style.display = "none";

      var summaryHtml = '';

      // 靈符圖 + 上下爻符號 + 卦名（跟 LIFF 頁面一致）
      if (data.primary_image_url) {
        var upperSymbol = guaUnicode[data.upper_gua] || '';
        var lowerSymbol = guaUnicode[data.lower_gua] || '';
        var guaLabel = (data.upper_gua || '') + (data.lower_gua || '');
        summaryHtml += '<div style="text-align:center;margin-bottom:16px;">';
        if (upperSymbol || lowerSymbol) {
          summaryHtml += '<div style="font-size:22px;color:var(--winds-gold);margin-bottom:6px;">' + upperSymbol + lowerSymbol + '</div>';
        }
        summaryHtml += '<img src="' + data.primary_image_url + '" alt="卦象" class="winds-talisman-img">';
        if (data.hexagram_name || guaLabel) {
          summaryHtml += '<div style="font-size:13px;color:#9b8aa0;margin-top:6px;">' + (guaLabel ? guaLabel + '　' : '') + (data.hexagram_name || '') + '卦</div>';
        }
        summaryHtml += '</div>';
      }

      // 摘要（處理 MD 格式）
      if (data.summary) {
        var cleanSummary = data.summary
          .replace(/^## (.+)$/gm, '<div class="winds-section-title">$1</div>')
          .replace(/^### (.+)$/gm, '<div class="winds-section-subtitle">$1</div>')
          .replace(/#{1,6}\s*/g, '')
          .replace(/\*\*(.*?)\*\*/g, '$1')
          .replace(/\*(.*?)\*/g, '$1')
          .replace(/---+/g, '─────')
          .replace(/\n/g, '<br>');
        summaryHtml += '<div class="winds-content-text">' + cleanSummary + '</div>';
      }

      // 購買時間
      if (data.purchased_at) {
        try {
          var pDate = new Date(data.purchased_at);
          var pStr = pDate.toLocaleString("zh-TW", { timeZone: "Asia/Taipei", year: "numeric", month: "2-digit", day: "2-digit", hour: "2-digit", minute: "2-digit" });
          summaryHtml += '<div class="winds-meta" style="margin-top:12px;">購買時間：' + pStr + '</div>';
        } catch(e) {}
      }

      // OA 按鈕
      summaryHtml += '<div style="text-align:center;margin-top:24px;">'
        + '<a href="' + LINE_OA_URL + '" class="winds-btn winds-btn-primary" style="display:block;text-decoration:none;text-align:center;">找風問幸福</a>'
        + '</div>';

      $("contentText").innerHTML = summaryHtml;

      // 隱藏不該顯示的區塊
      var hideIds = ["astroCard", "talismanWrap", "cardGridWrap", "oracleSection", "fortuneLineWrap", "cardWallpaperWrap", "metaInfo", "shareBtn"];
      hideIds.forEach(function(id) { var el = $(id); if (el) el.style.display = "none"; });
    }

    function getToken() {
      var params = new URLSearchParams(window.location.search);
      return params.get("token") || params.get("deliveryToken") || "";
    }

    function fetchDelivery(token) {
      if (!token) {
        showError("連結無效", "缺少交付 Token，請確認付款確認訊息中的連結是否完整。");
        return;
      }
      startDeliveryPolling(token, 0);
    }

    var MAX_POLL = 18; // 18 × 10s = 3 分鐘
    var pollMessages = [
      "分靈體滔滔不絕中，請稍候片刻…",
      "靈符能量正在凝聚，稍等一下 ✨",
      "快好了，請再給分靈體一點時間 🔮",
      "靈符凝聚需要專注，請耐心等候…",
      "分靈體正全力投入你的問題中 ✨",
    ];

    function startDeliveryPolling(token, attempt) {
      // 更新等待提示文字（輪流顯示）
      var subEl = $("loadingSub");
      if (subEl) subEl.textContent = pollMessages[attempt % pollMessages.length];

      fetch(DELIVERY_API + "?token=" + encodeURIComponent(token), { method: "GET", headers: { 'X-Google-Id-Token': getGoogleIdToken() } })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (data.ok === true) {
          // 摘要模式：非本人且非剛付款
          if (data.summary_mode) {
            showSummaryMode(data);
            return;
          }
          var content = data.hexagram_content || data.description || "";
          if (!content) content = data.item_name ? ("您的 " + data.item_name + " 已備妥。") : "分靈體滔滔不絕中，請稍候片刻。";
          var meta = "";
          if (data.purchased_at) {
            try {
              var d = new Date(data.purchased_at);
              meta += "購買時間：" + d.toLocaleString("zh-TW", { timeZone: "Asia/Taipei", year: "numeric", month: "2-digit", day: "2-digit", hour: "2-digit", minute: "2-digit" });
            } catch(e) { meta += "購買時間：" + data.purchased_at; }
          }
          if (data.expires_at) meta += (meta ? "  |  " : "") + "有效期至：" + data.expires_at;
          var backUrl = "https://app.winds.tw/index.html";
          if (data.log_id) backUrl += "?log_id=" + data.log_id;
          var backBtn = $("backBtn");
          if (backBtn) backBtn.href = backUrl;
          showContent(content, meta, data.primary_image_url || "", data.card_images || [], {
            astro: data.astro,
            ben_ming_tarots: data.ben_ming_tarots,
            personality_profile: data.personality_profile,
            tarot_cards: data.tarot_cards,
            oracle_type: data.oracle_type,
            oracle_sign_text: data.oracle_sign_text,
            secondary_oracle_type: data.secondary_oracle_type,
            secondary_oracle_sign_text: data.secondary_oracle_sign_text,
            upper_gua: data.upper_gua || '',
            lower_gua: data.lower_gua || '',
            hexagram_name: data.hexagram_name || '',
            sheng_ke: data.sheng_ke || '',
            fortune_line: data.fortune_line || (data.astro && data.astro.fortune_line) || [],
          });
          
          // 渲染桌布下載
          if (data.card_urls && data.card_urls.length > 0) {
            renderCardWallpapers(data.card_urls, data.unlock_step || 1, getToken(), data.paid_at || '', data.talisman_elements || []);
          } else {
            // B 方案：桌布尚未就緒，顯示等待提示 + polling
            var wrap = $("cardWallpaperWrap");
            if (wrap) {
              wrap.style.display = "block";
              var grid = $("cardWallpaperGrid");
              if (grid) {
                grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:20px 0;">' +
                  '<div style="font-size:24px;margin-bottom:8px;">🔮</div>' +
                  '<div id="cardLoadingText" style="font-size:13px;color:#9b8aa0;">量能靈符正在比對凝聚中...</div></div>';
              }
              // 每 8 秒 polling，最多 12 次（~96 秒）
              startCardPolling(token, 0);
            }
          }
        } else {
          var reason = data.reason || "unknown";
          // 解讀尚未生成（not_paid = 付款成功但 LLM 還在跑）→ 繼續 polling
          if ((reason === "not_paid" || reason === "generating") && attempt < MAX_POLL) {
            setTimeout(function() { startDeliveryPolling(token, attempt + 1); }, 10000);
            return;
          }
          // 超時或其他錯誤
          if (attempt >= MAX_POLL) {
            showError("靈符尚在凝聚中", "解讀需要多一點時間，完成後將透過 LINE 推播通知你 🔮");
            return;
          }
          if (reason === "not_found") showError("連結已失效或無使用權限", data.message || "找不到此記錄。");
          else if (reason === "expired") showError("此連結已過期", data.message || "連結有效期 7 天。");
          else if (reason === "missing_token") showError("連結無效", data.message || "缺少必要參數。");
          else showError("系統暫時無法取得內容", data.message || "請稍後重試。");
        }
      })
      .catch(function(e) {
        if (attempt < MAX_POLL) {
          setTimeout(function() { startDeliveryPolling(token, attempt + 1); }, 10000);
        } else {
          showError("系統暫時無法取得內容", "請稍後重試。（" + e.toString() + "）");
        }
      });
    }

    $("shareBtn").addEventListener("click", async function(e) {
      e.preventDefault();
      var shareToken = getToken();
      var shareDeliveryUrl = shareToken ? "https://app.winds.tw/delivery?token=" + shareToken : LINE_OA_URL;
      var shareText = "🌀 找風問幸福 — 我的占卜結果\n\n我剛完成了一次深度占卜，想跟你分享 ✨\n\n👉 " + shareDeliveryUrl;

      // 即時生成 OG 圖（有快取）
      var btn = $("shareBtn");
      var origText = btn.textContent;
      btn.textContent = "生成分享圖中...";
      btn.disabled = true;
      try {
        var ogResp = await fetch(WORKER_API + "/generate-og-image", {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ delivery_token: shareToken })
        });
        var ogData = await ogResp.json();
        if (ogData.og_url) shareDeliveryUrl = shareDeliveryUrl; // OG 圖已存，LINE 爬蟲會抓到
      } catch(ex) {}
      btn.textContent = origText;
      btn.disabled = false;
      try {
        if (navigator.share) {
          navigator.share({ title: "找風問幸福 — 占卜結果", text: shareText, url: shareDeliveryUrl }).catch(function() {
            if (navigator.clipboard) navigator.clipboard.writeText(shareText).then(function() { alert("已複製分享內容 👍"); });
          });
        } else {
          if (navigator.clipboard) navigator.clipboard.writeText(shareText).then(function() { alert("已複製分享連結 👍"); });
          else prompt("請複製以下連結分享：", shareDeliveryUrl);
        }
      } catch(err) { alert("分享功能暫時無法使用，請稍後再試"); }
    });


    showLoading();
    var token = getToken();
    // 預載價格設定（不阻塞主流程）
    fetch(WORKER_API + "/config").then(function(r){return r.json()}).then(function(c){
      if(c.unlock_price) window._configUnlockPrice = c.unlock_price;
    }).catch(function(){});
    // Google SSO: 直接載入（不需 LIFF init）
    var savedToken = "";
    try { savedToken = localStorage.getItem("winds_google_token") || ""; } catch(e) {}
    if (savedToken) { try { var _p = JSON.parse(atob(savedToken.split('.')[1].replace(/-/g,'+').replace(/_/g,'/'))); if (_p.exp && _p.exp * 1000 < Date.now()) { localStorage.removeItem("winds_google_token"); savedToken = ""; } } catch(e) { localStorage.removeItem("winds_google_token"); savedToken = ""; } }
    if (savedToken) { googleIdToken = savedToken; }
    fetchDelivery(token);

  })();
  </script>
</body>
