<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>系統維護中 — 找風問幸福</title>
  <link href="https://fonts.googleapis.com/css2?family=LXGW+WenKai+TC:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d0d0d;
      color: #c9a84c;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
      text-align: center;
    }
    .icon { font-size: 64px; margin-bottom: 24px; animation: pulse 2s infinite; }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    h1 { font-family: 'LXGW WenKai TC', cursive; font-size: 22px; font-weight: 600; margin-bottom: 12px; color: #c9a84c; }
    p { font-size: 15px; line-height: 1.8; color: rgba(201,168,76,0.7); max-width: 280px; }
    .divider {
      width: 60px; height: 1px;
      background: linear-gradient(to right, transparent, #c9a84c, transparent);
      margin: 24px auto;
    }
  </style>
</head>
<body>
  <div class="icon">🔮</div>
  <h1>系統維護中</h1>
  <div class="divider"></div>
  <p>我們正在為你優化占卜系統<br>請稍候片刻，很快就會回來</p>
</body>
</html>
